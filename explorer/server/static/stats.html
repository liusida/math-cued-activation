<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <title>ICA Lens Feature Stats</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #fff;
      --text: #151922;
      --muted: #647084;
      --border: #cbd3df;
      --accent: #1f6feb;
      --accent-soft: #e8f1ff;
      --shadow: 0 1px 2px rgb(20 25 34 / .08), 0 10px 30px rgb(20 25 34 / .06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 12px 18px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    h1 { margin: 0; font-size: 19px; letter-spacing: 0; }
    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 9px;
      border-radius: 6px;
    }
    .nav a.active,
    .nav a:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }
    main {
      max-width: 1400px;
      margin: 18px auto 40px;
      padding: 0 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .toolbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .toolbar-left,
    .legend {
      display: flex;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    select {
      min-width: 150px;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 6px 8px;
      font: inherit;
    }
    #summary {
      color: var(--muted);
      font-weight: 750;
      padding-bottom: 7px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .legend-item[aria-pressed="true"] {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .empty,
    .error {
      padding: 18px;
      color: var(--muted);
    }
    .error {
      color: #b42318;
      background: #fff1f0;
      border: 1px solid #ffccc7;
      border-radius: 8px;
    }
    .matrix {
      display: grid;
      gap: 12px;
    }
    .layer-row {
      display: grid;
      grid-template-columns: 80px 120px 1fr;
      align-items: start;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid #e7ebf1;
    }
    .layer-row:first-child {
      border-top: 0;
      padding-top: 0;
    }
    .layer-name {
      font-weight: 850;
      padding-top: 3px;
    }
    .layer-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      padding-top: 5px;
    }
    .dots {
      display: flex;
      align-items: flex-start;
      gap: 3px;
      flex-wrap: wrap;
    }
    .dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 5px;
      border: 1px solid #d4dce8;
      background: #f8fafc;
      color: #334155;
      font-size: 8.5px;
      line-height: 1;
      font-weight: 850;
      text-decoration: none;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
    }
    .dot:hover {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .dot.missing {
      color: #94a3b8;
      background: #f1f5f9;
    }
    .dot.dead {
      opacity: .35;
    }
    .dot.low { background: #e8f1ff; border-color: #b8cff8; color: #1e4f9a; }
    .dot.mid { background: #b8d7ff; border-color: #7fb0ef; color: #173b73; }
    .dot.high { background: #4d8bd8; border-color: #2f6fbd; color: #fff; }
    .dot.extreme { background: #164d96; border-color: #164d96; color: #fff; }
    @media (max-width: 780px) {
      .top { align-items: flex-start; flex-direction: column; }
      .layer-row { grid-template-columns: 1fr; }
      .layer-count { padding-top: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <h1>ICA Lens Feature Stats</h1>
      <nav class="nav">
        <a href="/" data-nav-route="/">Explorer</a>
        <a href="/sae-explorer" data-nav-route="/sae-explorer">SAE Explorer</a>
        <a href="/stats" class="active" data-nav-route="/stats">Stats</a>
        <a href="/feature" data-nav-route="/feature">Feature</a>
        <a href="/annotate" data-nav-route="/annotate">Annotate</a>
        <a href="/random-components" data-nav-route="/random-components">Random</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="panel">
      <div class="toolbar">
        <div class="toolbar-left">
          <label>
            Model
            <select id="modelSelect"></select>
          </label>
          <label>
            Layer
            <select id="layerSelect"></select>
          </label>
          <div id="summary">Loading feature stats...</div>
        </div>
        <div class="legend" aria-label="Displayed metric">
          <button class="legend-item" data-metric="effective_context_mean" type="button" aria-pressed="true">ERF</button>
          <button class="legend-item" data-metric="kurtosis" type="button" aria-pressed="false">Kurtosis</button>
          <button class="legend-item" data-metric="activation_frequency" type="button" aria-pressed="false">Active %</button>
          <button class="legend-item" data-metric="activation_frequency_gt_1" type="button" aria-pressed="false">Active &gt;1 %</button>
          <button class="legend-item" data-metric="top1_frequency" type="button" aria-pressed="false">Top-1 /10k</button>
          <button class="legend-item" data-metric="top3_frequency" type="button" aria-pressed="false">Top-3 /10k</button>
          <button class="legend-item" data-metric="max_activation" type="button" aria-pressed="false">Max</button>
        </div>
      </div>
      <div id="message" class="empty">Loading feature stats...</div>
      <div id="matrix" class="matrix" hidden></div>
    </div>
  </main>

<script>
const els = {
  model: document.getElementById("modelSelect"),
  layer: document.getElementById("layerSelect"),
  summary: document.getElementById("summary"),
  message: document.getElementById("message"),
  matrix: document.getElementById("matrix"),
  metricButtons: Array.from(document.querySelectorAll("[data-metric]")),
};

const STORAGE_KEYS = {
  model: "icaLensV9.stats.model",
  layer: "icaLensV9.stats.layer",
  metric: "icaLensV9.stats.metric",
};

const state = {
  model: "",
  layer: "",
  metric: localStorage.getItem(STORAGE_KEYS.metric) || "effective_context_mean",
  layers: [],
};

async function api(path) {
  const response = await fetch(path, { headers: { "content-type": "application/json" } });
  if (!response.ok) {
    let detail = response.statusText;
    try { detail = (await response.json()).detail || detail; } catch {}
    throw new Error(detail);
  }
  return response.json();
}

async function init() {
  const params = new URLSearchParams(location.search);
  const requestedModel = params.get("model") || localStorage.getItem(STORAGE_KEYS.model) || "gpt2";
  const requestedLayer = normalizeLayer(params.get("layer") || localStorage.getItem(STORAGE_KEYS.layer) || "all");
  const models = await api("/api/models");
  const names = (models.models || []).map(model => model.model_name);
  fillSelect(els.model, names, names.includes(requestedModel) ? requestedModel : names[0]);
  bind();
  await loadLayers(requestedLayer);
}

function bind() {
  els.model.addEventListener("change", () => loadLayers("__all__"));
  els.layer.addEventListener("change", loadStats);
  els.metricButtons.forEach(button => {
    button.addEventListener("click", () => {
      state.metric = button.dataset.metric;
      localStorage.setItem(STORAGE_KEYS.metric, state.metric);
      renderStats();
    });
  });
}

async function loadLayers(requestedLayer) {
  state.model = els.model.value;
  localStorage.setItem(STORAGE_KEYS.model, state.model);
  setMessage("Loading layers...");
  const out = await api(`/api/layers?model=${encodeURIComponent(state.model)}`);
  const values = ["__all__", ...(out.layers || [])];
  fillSelect(els.layer, values, values.includes(requestedLayer) ? requestedLayer : values[0], value => value === "__all__" ? "All layers" : value);
  await loadStats();
}

async function loadStats() {
  state.model = els.model.value;
  state.layer = els.layer.value;
  localStorage.setItem(STORAGE_KEYS.model, state.model);
  if (state.layer !== "__all__") localStorage.setItem(STORAGE_KEYS.layer, state.layer);
  setMessage(state.layer === "__all__" ? "Loading all layers..." : `Loading ${state.layer}...`);
  if (state.layer === "__all__") {
    const layers = await api(`/api/layers?model=${encodeURIComponent(state.model)}`);
    const loaded = [];
    for (const layer of layers.layers || []) {
      const out = await api(`/api/components?model=${encodeURIComponent(state.model)}&layer=${encodeURIComponent(layer)}`);
      loaded.push({ layer, components: out.components || [] });
    }
    state.layers = loaded;
  } else {
    const out = await api(`/api/components?model=${encodeURIComponent(state.model)}&layer=${encodeURIComponent(state.layer)}`);
    state.layers = [{ layer: state.layer, components: out.components || [] }];
  }
  updateUrl();
  renderStats();
}

function renderStats() {
  updateMetricButtons();
  const features = state.layers.flatMap(layer => layer.components || []);
  const withValue = features.filter(feature => Number.isFinite(metricValue(feature))).length;
  const scope = state.layer === "__all__" ? `${state.layers.length} layers` : state.layer;
  els.summary.textContent = `${state.model} - ${scope} - ${features.length} features - ${withValue} with ${metricLabel(state.metric)}`;
  if (!state.layers.length) {
    setMessage("No features found.");
    els.matrix.hidden = true;
    return;
  }
  els.message.hidden = true;
  els.matrix.hidden = false;
  els.matrix.innerHTML = state.layers.map(layerRow).join("");
}

function layerRow(layer) {
  const features = layer.components || [];
  const withErf = features.filter(feature => Number.isFinite(Number(feature.effective_context_mean))).length;
  const top3Dead = features.filter(feature => feature.dead).length;
  return `
    <div class="layer-row">
      <div class="layer-name">${escapeHtml(layer.layer)}</div>
      <div class="layer-count">${withErf}/${features.length} ERF<br>${top3Dead}/${features.length} top-3 dead</div>
      <div class="dots">${features.map(feature => featureDot(layer.layer, feature)).join("")}</div>
    </div>
  `;
}

function featureDot(layer, feature) {
  const value = metricValue(feature);
  const className = metricClass(value, feature);
  const label = metricText(value);
  const featureId = Number(feature.component);
  const title = featureTitle(feature, value);
  const params = new URLSearchParams({ model: state.model, layer: String(layer), feature: String(featureId) });
  return `<a class="dot ${className}" href="/feature?${params.toString()}" title="${escapeAttr(title)}" aria-label="${escapeAttr(title)}">${escapeHtml(label)}</a>`;
}

function metricValue(feature) {
  const value = Number(feature[state.metric]);
  if (isPercentMetric(state.metric)) {
    return Number.isFinite(value) ? value * 100 : NaN;
  }
  if (isPer10kMetric(state.metric)) {
    return Number.isFinite(value) ? value * 10000 : NaN;
  }
  return value;
}

function metricText(value) {
  if (!Number.isFinite(value)) return "";
  if (isPercentMetric(state.metric)) {
    return value >= 10 ? value.toFixed(0) : value >= 1 ? value.toFixed(1) : value.toFixed(2);
  }
  if (isPer10kMetric(state.metric)) {
    return value.toFixed(1);
  }
  if (state.metric === "kurtosis") return value >= 100 ? value.toFixed(0) : value >= 10 ? value.toFixed(1) : value.toFixed(2);
  if (state.metric === "max_activation") return value >= 100 ? value.toFixed(0) : value >= 10 ? value.toFixed(1) : value.toFixed(2);
  return value >= 100 ? value.toFixed(0) : value >= 10 ? value.toFixed(1) : value.toFixed(0);
}

function metricClass(value, feature) {
  const classes = [];
  if (!Number.isFinite(value)) classes.push("missing");
  else if (state.metric === "effective_context_mean") classes.push(value >= 128 ? "extreme" : value >= 32 ? "high" : value >= 8 ? "mid" : "low");
  else if (state.metric === "kurtosis") classes.push(value >= 50 ? "extreme" : value >= 20 ? "high" : value >= 8 ? "mid" : "low");
  else if (isPercentMetric(state.metric)) {
    classes.push(value >= 70 ? "extreme" : value >= 40 ? "high" : value >= 10 ? "mid" : "low");
  }
  else if (isPer10kMetric(state.metric)) {
    classes.push(value >= 100 ? "extreme" : value >= 10 ? "high" : value >= 1 ? "mid" : "low");
  }
  else classes.push(value >= 50 ? "extreme" : value >= 20 ? "high" : value >= 5 ? "mid" : "low");
  if (feature.dead) classes.push("dead");
  return classes.join(" ");
}

function featureTitle(feature, value) {
  const id = `F${String(Number(feature.component)).padStart(6, "0")}`;
  const parts = [id, `${metricLabel(state.metric)} = ${Number.isFinite(value) ? metricText(value) : "missing"}`];
  if (state.metric === "effective_context_mean") {
    parts.push(`estimated ERF = ${formatMaybe(feature.effective_context_mean, 1)}`);
  } else if (state.metric === "kurtosis") {
    parts.push(`active-mirrored kurtosis = ${formatMaybe(feature.kurtosis, 2)}`);
    parts.push(`excess kurtosis = ${formatMaybe(feature.excess_kurtosis, 2)}`);
    parts.push(`kurtosis dead = ${feature.kurtosis_dead ? "yes" : "no"}`);
  } else if (state.metric === "activation_frequency") {
    parts.push(`active frequency = ${formatMaybePercent(feature.activation_frequency, 1)}`);
  } else if (state.metric === "activation_frequency_gt_1") {
    parts.push(`P(feature > 1) = ${formatMaybePercent(feature.activation_frequency_gt_1, 2)}`);
  } else if (state.metric === "top1_frequency") {
    parts.push(`top-1 count = ${formatMaybe(feature.top1_count, 0)}`);
    parts.push(`top-1 rate = ${formatMaybePer10k(feature.top1_frequency, 1)} per 10k tokens`);
    parts.push(`top-1 dead = ${feature.top1_dead ? "yes" : "no"}`);
  } else if (state.metric === "top3_frequency") {
    parts.push(`top-3 count = ${formatMaybe(feature.top3_count, 0)}`);
    parts.push(`top-3 rate = ${formatMaybePer10k(feature.top3_frequency, 1)} per 10k tokens`);
    parts.push(`top-3 dead = ${feature.dead ? "yes" : "no"}`);
  } else if (state.metric === "max_activation") {
    parts.push(`max activation = ${formatMaybe(feature.max_activation, 2)}`);
  }
  return parts.join("\n");
}

function updateMetricButtons() {
  els.metricButtons.forEach(button => {
    button.setAttribute("aria-pressed", button.dataset.metric === state.metric ? "true" : "false");
  });
}

function metricLabel(metric) {
  return {
    effective_context_mean: "ERF",
    kurtosis: "kurtosis",
    activation_frequency: "active %",
    activation_frequency_gt_1: "active >1 %",
    top1_frequency: "top-1 /10k",
    top3_frequency: "top-3 /10k",
    max_activation: "max",
  }[metric] || metric;
}

function isPercentMetric(metric) {
  return metric === "activation_frequency"
    || metric === "activation_frequency_gt_1";
}

function isPer10kMetric(metric) {
  return metric === "top1_frequency" || metric === "top3_frequency";
}

function fillSelect(select, values, selected, labeler = value => value) {
  select.innerHTML = values.map(value => `<option value="${escapeAttr(value)}">${escapeHtml(labeler(value))}</option>`).join("");
  if (values.includes(selected)) select.value = selected;
}

function updateUrl() {
  const params = new URLSearchParams();
  if (state.model) params.set("model", state.model);
  if (state.layer) params.set("layer", state.layer === "__all__" ? "all" : state.layer);
  history.replaceState(null, "", `${location.pathname}?${params.toString()}`);
  updateNavLinks();
}

function updateNavLinks() {
  const params = new URLSearchParams();
  if (state.model) params.set("model", state.model);
  if (state.layer && state.layer !== "__all__") params.set("layer", state.layer);
  document.querySelectorAll("[data-nav-route]").forEach(link => {
    const route = link.dataset.navRoute || "/";
    link.href = params.toString() ? `${route}?${params.toString()}` : route;
  });
}

function normalizeLayer(value) {
  return value === "all" ? "__all__" : value;
}

function setMessage(message) {
  els.summary.textContent = message;
  els.message.hidden = false;
  els.message.className = "empty";
  els.message.textContent = message;
  els.matrix.hidden = true;
}

function formatMaybe(value, digits) {
  const number = Number(value);
  return Number.isFinite(number) ? number.toFixed(digits) : "?";
}

function formatMaybePercent(value, digits) {
  if (value === null || value === undefined) return "?";
  const number = Number(value);
  return Number.isFinite(number) ? `${(100 * number).toFixed(digits)}%` : "?";
}

function formatMaybePer10k(value, digits) {
  if (value === null || value === undefined) return "?";
  const number = Number(value);
  return Number.isFinite(number) ? (10000 * number).toFixed(digits) : "?";
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, "&#96;");
}

init().catch(error => {
  els.message.hidden = false;
  els.message.className = "error";
  els.message.textContent = error.message || String(error);
  els.matrix.hidden = true;
});
</script>
</body>
</html>
