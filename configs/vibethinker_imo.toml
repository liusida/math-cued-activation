version = 1

[model]
id = "WeiboAI/VibeThinker-3B"
tokenizer = "WeiboAI/VibeThinker-3B"
revision = "main"
hidden_size = 2048
layer_count = 36
dtype = "auto"

[dataset]
id = "OpenEvals/IMO-AnswerBench"
split = "train"
revision = "main"
id_field = "id"
prompt_field = "problem"
answer_field = "answer"
sample_size = 400
start_index = 0

[prompt]
answer_only = false

[vllm]
api_url = "http://127.0.0.1:8000/v1/chat/completions"
api_key_file = "api_tokens/.vllm"
server_name = "local"
temperature = 0.0
top_p = 0.95
max_tokens = 0
concurrency = 6
request_timeout = 7200.0
retries = 3
retry_sleep = 5.0
host = "127.0.0.1"
port = 8000
dtype = "bfloat16"
max_model_len = 65536
gpu_memory_utilization = 0.95
cuda_visible_devices = "0"
disable_flashinfer_sampler = true
startup_timeout = 600.0
shutdown_timeout = 30.0
pid_file = "outputs/vllm/vibethinker.pid"
log_file = "logs/vllm/vibethinker.log"

[storage]
responses = "outputs/imo-answerbench-responses/WeiboAI__VibeThinker-3B"
activations = "~/data/ICA-data/math-cued-activation"
ica = "results/ica"
explorer = "explorer/runs"
database = "explorer/feature_index.sqlite"

[capture]
layers = [20, 32]
site = "residual-post"
activation_dtype = "float16"
capture_prompt_activations = true
sanity_check_next_token = false

[ica]
max_rows = 1000000
seed = 0
max_iter = 100
tolerance = 0.0001
nonlinearity = "logcosh"
whitening_solver = "eigh"
device = "cuda"

[enrichment]
max_rows = 500000
seed = 0
examples = 10
context_window = 32
chunk_size = 4096
write_workers = 8
device = "cuda"
dtype = "float32"

[explorer]
run_id = "math_cued_vibethinker_only_layer32_c2048_iter100"
display_name = "VibeThinker-3B"
host = "127.0.0.1"
port = 8000
